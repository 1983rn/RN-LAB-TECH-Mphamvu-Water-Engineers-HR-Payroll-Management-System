services:
  - type: web
    name: rn-lab-tech-hr-payroll
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level debug
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: mphamvu-hr-db
          property: connectionString

databases:
  - name: mphamvu-hr-db
    databaseName: mphamvu_hr
    user: mphamvu_admin
    plan: free
